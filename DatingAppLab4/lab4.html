<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starter Pricing Card</title>

    <!-- Tailwind CSS CDN (latest v3) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Iconify (icones.js.org icons) -->
    <script src="https://cdn.jsdelivr.net/npm/iconify-icon@2.1.0/dist/iconify-icon.min.js"></script>

    <!-- Google Fonts: DM Sans -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Gradient top border via pseudo-element */
        .card-wrapper {
            position: relative;
            border-radius: 1rem;
            padding: 2px; /* border width */
            background: linear-gradient(to bottom right, #3ee8c0, #3b82f6);
            box-shadow: 0 8px 32px rgba(0,0,0,0.10);
        }

        .card-inner {
            background: #ffffff;
            border-radius: calc(1rem - 2px);
            padding: 2rem 1.75rem 1.75rem;
            min-width: 280px;
            max-width: 340px;
        }

        /* Hover state */
        .card-wrapper:hover {
            box-shadow: 0 16px 48px rgba(59,130,246,0.18);
            transition: box-shadow 0.3s ease;
        }

        /* Badge */
        .badge {
            display: inline-block;
            background: #e8e8e8;
            color: #555;
            font-size: 0.72rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 9999px;
            letter-spacing: 0.01em;
            margin-bottom: 0.6rem;
        }

        /* Price */
        .price-big {
            font-size: 2.6rem;
            font-weight: 700;
            color: #111827;
            line-height: 1;
        }

        .price-unit {
            font-size: 0.95rem;
            font-weight: 500;
            color: #6b7280;
        }

        .billed-text {
            font-size: 0.8rem;
            color: #6b7280;
            margin-top: 2px;
        }

        /* Button */
        .btn-downgrade {
            display: block;
            width: 100%;
            text-align: center;
            background: #e5e7eb;
            color: #374151;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.65rem 1rem;
            border-radius: 0.5rem;
            margin: 1.25rem 0;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-downgrade:hover {
            background: #d1d5db;
        }

        /* Divider */
        .divider {
            border: none;
            border-top: 1px solid #f0f0f0;
            margin-bottom: 1rem;
        }

        /* Feature list */
        .feature-item {
            display: flex;
            align-items: flex-start;
            gap: 0.55rem;
            margin-bottom: 0.75rem;
        }

        .feature-icon {
            flex-shrink: 0;
            margin-top: 2px;
        }

        .feature-text {
            font-size: 0.875rem;
            color: #111827;
            font-weight: 500;
            line-height: 1.4;
        }

        .feature-sub {
            font-size: 0.78rem;
            color: #6b7280;
            font-weight: 400;
            margin-top: 1px;
        }
    </style>
</head>
<body>


<div>


    <div class="card-wrapper">
        <div class="card-inner">

            <!-- Title -->
            <h2 class="text-2xl font-bold text-gray-900 mb-2">Starter</h2>

            <!-- Badge -->
            <span class="badge">7-days free then:</span>

            <!-- Price -->
            <div class="flex items-baseline gap-1 mt-1">
                <span class="price-big">$83.25</span>
                <span class="price-unit">/month</span>
            </div>
            <p class="billed-text">Billed yearly at <strong class="text-gray-700">$999.00</strong></p>

            <!-- CTA Button -->
            <button class="btn-downgrade">Downgrade to Starter</button>

            <hr class="divider" />

            <!-- Features -->

            <!-- Feature 1 -->
            <div class="feature-item">
          <span class="feature-icon">
  <iconify-icon icon="material-icon-theme:gemini-ai" style="color: #4ade80; font-size: 18px;"></iconify-icon>
</span>

                <div>
                    <p class="feature-text">Primary user + 0 free team members</p>
                    <p class="feature-sub">(extra team members for $35/month)</p>
                </div>
            </div>

            <!-- Feature 2 -->
            <div class="feature-item">
          <span class="feature-icon">
  <iconify-icon icon="material-icon-theme:gemini-ai" style="color: #4ade80; font-size: 18px;"></iconify-icon>
</span>

                <div>
                    <p class="feature-text">Save unlimited properties</p>
                </div>
            </div>

            <!-- Feature 3 -->
            <div class="feature-item">
          <span class="feature-icon">
  <iconify-icon icon="material-icon-theme:gemini-ai" style="color: #4ade80; font-size: 18px;"></iconify-icon>
</span>

                <div>
                    <p class="feature-text"><strong>10 000</strong> exports</p>
                    <p class="feature-sub">(additional exports at $0.02 each)</p>
                </div>
            </div>

            <!-- Feature 4 -->
            <div class="feature-item">
          <span class="feature-icon">
  <iconify-icon icon="material-icon-theme:gemini-ai" style="color: #4ade80; font-size: 18px;"></iconify-icon>
</span>

                <div>
                    <p class="feature-text"><strong>500 free skip traces</strong></p>
                    <p class="feature-sub">(additional skip tracing at $0.08 each)</p>
                </div>
            </div>

            <!-- Feature 5 -->
            <div class="feature-item">
          <span class="feature-icon">
  <iconify-icon icon="material-icon-theme:gemini-ai" style="color: #4ade80; font-size: 18px;"></iconify-icon>
</span>

                <div>
                    <p class="feature-text">Imports $0.01</p>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
